version: '3.8'

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: qartuli-backend
    restart: unless-stopped
    ports:
      - '3010:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qartuli-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: qartuli-admin
    restart: unless-stopped
    ports:
      - '3011:80'
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:3000}
    networks:
      - qartuli-network

  db:
    image: postgres:16-alpine
    container_name: qartuli-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-qartuli_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qartuli-network

  redis:
    image: redis:7-alpine
    container_name: qartuli-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - qartuli-network

volumes:
  postgres_data:
  redis_data:

networks:
  qartuli-network:
    driver: bridge
