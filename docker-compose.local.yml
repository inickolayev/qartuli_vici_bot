services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: qartuli-backend
    volumes:
      - ./apps/backend/src:/app/src
      - ./apps/backend/prisma:/app/prisma
      - /app/node_modules
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/qartuli_bot
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qartuli-network

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile.dev
    container_name: qartuli-admin
    volumes:
      - ./apps/admin/src:/app/src
      - /app/node_modules
    ports:
      - '3002:3001'
    environment:
      - VITE_API_URL=http://localhost:3000
    networks:
      - qartuli-network

  db:
    image: postgres:16-alpine
    container_name: qartuli-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=qartuli_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - qartuli-network

  redis:
    image: redis:7-alpine
    container_name: qartuli-redis
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - qartuli-network

volumes:
  postgres_data:
  redis_data:

networks:
  qartuli-network:
    driver: bridge
